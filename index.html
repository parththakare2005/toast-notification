<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
    <link rel="stylesheet" href="toast.css">
</head>
<body>
    <div class="container">
        <h3>
            Toast Notification in 
            HTML CSS JavaScript
         </h3>
       <div class="toast-buttons">
           <div class="toast-col">
               <button type="button" 
                       class="custom-toast 
                              success-toast" >
                   Submit
                 </button>
               <button type="button" 
                       class="custom-toast 
                              danger-toast">
                   Failed
                 </button>
               <button type="button" 
                       class="custom-toast 
                              info-toast">
                   Information
                 </button>
               <button type="button" 
                       class="custom-toast 
                              warning-toast">
                   Warning
                 </button>
           </div>
       </div>
    </div>
    <div id="toast"></div>
    <script src="toaster.js"></script>
</body>
</html>
